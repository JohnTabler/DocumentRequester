name: Sync CSV from Google Drive and Convert to JSON

on:
  schedule:
    - cron: '30 20 * * 5'  # Every Monday 9am UTC — adjust to match your PA recurrence
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Download CSVs from Google Drive and Convert to JSON
        run: python3 scripts/csv_to_json.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/DataTest.json
          git commit -m "Auto-sync from Google Drive" || echo "No changes to commit"
          git push
